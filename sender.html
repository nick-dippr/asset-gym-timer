<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Gym Timer Controller</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 25px; background: #1a1a1a; color: white; max-width: 720px; margin: 0 auto; }
        h1 { text-align: center; }
        .status { padding: 15px; margin: 15px 0; background: #333; border-radius: 8px; text-align: center; font-weight: bold; }
        input, button { padding: 15px; margin: 8px 0; width: 100%; font-size: 1.1em; border-radius: 8px; }
        input { background: #333; color: white; border: 1px solid #555; }
        button.green { background: #5cb85c; color: white; font-weight: bold; }
        button.red { background: #d9534f; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Asset Gym Timer Controller</h1>
    <div class="status" id="status">Not connected</div>

    <button class="green" onclick="connectCast()">🔗 Connect to Google TV</button>

    <h2>Timer Settings</h2>
    <input type="number" id="get-ready" value="10" placeholder="Get Ready (sec)">
    <input type="text" id="round-time" value="04:00" placeholder="Round Time (MM:SS)">
    <input type="number" id="rest1" value="30" placeholder="Short Rest (sec)">
    <input type="number" id="rest2" value="30" placeholder="Long Rest (sec)">
    <input type="number" id="rounds" value="4" placeholder="Total Rounds">

    <button class="green" onclick="sendStart()">▶️ START TIMER</button>
    <button onclick="sendPause()">⏸️ PAUSE</button>
    <button onclick="sendResume()">▶️ RESUME</button>
    <button class="red" onclick="sendReset()">🔄 RESET</button>

    <script>
        let session = null;
        const APP_ID = "BCFFA301";

        function updateStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function connectCast() {
            updateStatus("Connecting...");
            
            const castContext = cast.framework.CastContext.getInstance();
            castContext.setOptions({
                receiverApplicationId: APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });

            castContext.requestSession((s) => {
                session = s;
                updateStatus("✅ Connected to TV!");
                console.log("Session established", s);
            }, (error) => {
                console.error("Connection error:", error);
                updateStatus("❌ Connection failed");
            });
        }

        function sendMessage(data) {
            if (!session) {
                alert("Please connect to the TV first");
                return;
            }
            console.log("Sending message:", data);
            session.sendMessage('urn:x-cast:com.asset.gymtimer', data)
                .then(() => console.log("Message sent successfully"))
                .catch(err => console.error("Send error:", err));
        }

        function sendStart() {
            const config = {
                getReady: parseInt(document.getElementById('get-ready').value) || 10,
                roundTime: document.getElementById('round-time').value || "04:00",
                rest1: parseInt(document.getElementById('rest1').value) || 30,
                rest2: parseInt(document.getElementById('rest2').value) || 30,
                totalRounds: parseInt(document.getElementById('rounds').value) || 4
            };
            sendMessage({ command: 'LOAD_AND_START', config: config });
        }

        function sendPause()  { sendMessage({ command: 'PAUSE' }); }
        function sendResume() { sendMessage({ command: 'RESUME' }); }
        function sendReset()  { sendMessage({ command: 'RESET' }); }
    </script>
</body>
</html>
