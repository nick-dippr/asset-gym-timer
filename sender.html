<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Gym Timer Controller</title>
    <script src="https://www.gstatic.com/cvjs/v1.0.0/cast_sender.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: white; max-width: 700px; margin: 0 auto; line-height: 1.5; }
        .status { padding: 15px; margin: 10px 0; border-radius: 8px; background: #333; }
        button { padding: 15px; margin: 10px 0; width: 100%; font-size: 1.1em; }
    </style>
</head>
<body>
    <h1>Asset Gym Timer Controller - Debug</h1>
    <div class="status" id="status">Loading Cast SDK...</div>

    <button onclick="connectCast()">🔗 Connect to Google TV</button>

    <script>
        const APP_ID = "BCFFA301";
        let session = null;

        function log(msg) {
            console.log(msg);
            document.getElementById('status').innerHTML += "<br>" + msg;
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                if (typeof cast !== 'undefined' && cast.framework) {
                    log("✅ Cast SDK loaded successfully");
                    initializeCast();
                } else {
                    log("❌ Cast SDK still not loaded after delay");
                }
            }, 2000);
        });

        function initializeCast() {
            const castContext = cast.framework.CastContext.getInstance();
            castContext.setOptions({
                receiverApplicationId: APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
            log("Cast context initialized");
        }

        function connectCast() {
            log("Attempting to connect...");
            const castContext = cast.framework.CastContext.getInstance();
            
            castContext.requestSession((s) => {
                session = s;
                log("✅ Successfully connected!");
            }, (error) => {
                log("❌ Connection error: " + error);
                alert("Error: " + error);
            });
        }
    </script>
</body>
</html>
