<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Gym Timer Controller</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; background: #1a1a1a; color: white; max-width: 700px; margin: 0 auto; }
        .status { padding: 15px; margin: 15px 0; background: #333; border-radius: 8px; text-align: center; font-weight: bold; }
        button { padding: 16px; margin: 10px 0; width: 100%; font-size: 1.2em; border-radius: 8px; }
        button.green { background: #5cb85c; color: white; }
    </style>
</head>
<body>
    <h1>Asset Gym Timer Controller</h1>
    <div class="status" id="status">Ready</div>

    <button class="green" onclick="connectCast()">🔗 Connect & Launch Timer on TV</button>

    <script>
        let session = null;
        const APP_ID = "BCFFA301";

        function updateStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function connectCast() {
            updateStatus("Connecting to Google TV...");
            
            const castContext = cast.framework.CastContext.getInstance();
            castContext.setOptions({
                receiverApplicationId: APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });

            castContext.requestSession((s) => {
                session = s;
                updateStatus("✅ Connected! Launching timer...");
                
                // Send a start command immediately
                setTimeout(() => {
                    session.sendMessage('urn:x-cast:com.asset.gymtimer', {
                        command: 'LOAD_AND_START',
                        config: {
                            getReady: 10,
                            roundTime: "04:00",
                            rest1: 30,
                            rest2: 30,
                            totalRounds: 4
                        }
                    });
                }, 1500);
            }, (error) => {
                updateStatus("❌ Failed: " + error);
                console.error(error);
            });
        }
    </script>
</body>
</html>
